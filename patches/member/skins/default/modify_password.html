<include target="./common_header.html" />
<load target="css/church_pw_toggle.css" />
<load target="css/church_modify_password.css" />
<load target="js/church_pw_toggle.js" />
<div class="church-modify-password">
<h1>{$member_title = '암호변경'}</h1>
<div cond="$XE_VALIDATOR_MESSAGE" class="message {$XE_VALIDATOR_MESSAGE_TYPE}">
	<p>{$XE_VALIDATOR_MESSAGE}</p>
</div>
<form ruleset="modifyPassword" id="fo_insert_member" action="./" method="post">
	<input type="hidden" name="module" value="member" />
	<input type="hidden" name="act" value="procMemberModifyPassword" />
    <input type="hidden" name="mid" value="{$mid}" />
    <input type="hidden" name="document_srl" value="{$document_srl}" />
    <input type="hidden" name="page" value="{$page}" />
    <input type="hidden" name="xe_validator_id" value="modules/member/skins/default/1" />
    <input type="hidden" name="success_return_url" value="{getUrl('act','dispMemberModifyPassword')}" />
	<div>
		<input type="email" disabled="disabled" value="{$formValue}" id="uid" placeholder="{lang($identifier)}" title="{lang($identifier)}" />
	</div>
	<div class="church-pw-field">
		<input type="password" name="current_password" id="cpw" required placeholder="현재 비밀번호" title="현재 비밀번호" autocomplete="current-password" />
		<button type="button" class="church-pw-toggle" data-target="cpw" aria-label="비밀번호 보기" title="비밀번호 보기"><i class="xi-eye" aria-hidden="true"></i></button>
	</div>
	<div class="church-pw-field">
		<input type="password" name="password1" id="npw1" required placeholder="새 비밀번호" title="새 비밀번호" autocomplete="new-password" />
		<button type="button" class="church-pw-toggle" data-target="npw1" aria-label="비밀번호 보기" title="비밀번호 보기"><i class="xi-eye" aria-hidden="true"></i></button>
		<span class="help-inline">{$lang->about_password_strength[$member_config->password_strength]}</span>
	</div>
	<div class="church-pw-field">
		<input type="password" name="password2" id="npw2" required placeholder="새 비밀번호 확인" title="새 비밀번호 확인" autocomplete="new-password" />
		<button type="button" class="church-pw-toggle" data-target="npw2" aria-label="비밀번호 보기" title="비밀번호 보기"><i class="xi-eye" aria-hidden="true"></i></button>
	</div>
	<input type="submit" value="등록" class="btn btn-inverse" />
</form>
</div>
<include target="./common_footer.html" />
