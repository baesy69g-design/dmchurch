<template id="dmc-dm-item-template">

	<div class="dmc-guide-section dmc-dm-row" data-index="__INDEX__">

		<div class="dmc-guide-section-head">

			<strong>__NUM__</strong>

			<button type="button" class="dmc-btn dmc-btn-sm dmc-btn-danger dmc-remove-dm-item">삭제</button>

		</div>

		<input type="hidden" name="item_id___INDEX__" value="" />

		<input type="hidden" name="item_sub_mid___INDEX__" value="" />

		<div class="dmc-person-grid">

			<div class="dmc-field dmc-person-photo dmc-dm-photo-simple">

				<label>선교 이미지</label>

				<input type="hidden" name="existing_item_thumb___INDEX__" value="" />

				<div class="dmc-info-preview dmc-slide-empty">미등록</div>

				<input type="file" name="item_thumb___INDEX__" accept="image/jpeg,image/png,image/webp,image/gif" />

			</div>

			<div class="dmc-field dmc-person-photo dmc-dm-photo-sub" style="display:none">

				<label>사진 <span class="dmc-req">*</span></label>

				<input type="hidden" name="existing_item_sub_photo___INDEX__" value="" />

				<div class="dmc-info-preview dmc-slide-empty">미등록</div>

				<input type="file" name="item_sub_photo___INDEX__" accept="image/jpeg,image/png,image/webp,image/gif" />

			</div>

			<div class="dmc-person-fields">

				<div class="dmc-field">

					<label>구분 <span class="dmc-req">*</span></label>

					<select name="item_category___INDEX__" class="dmc-input-wide" required="required">

						<option value="dispatch">우리교회 파송선교사</option>

						<option value="support">우리교회가 돕는 선교지</option>

					</select>

				</div>

				<div class="dmc-field">

					<label>국가 <span class="dmc-req">*</span></label>

					<input type="text" name="item_country___INDEX__" value="" class="dmc-input-wide" required="required" placeholder="국가" />

				</div>

				<div class="dmc-field">

					<label>선교사 이름</label>

					<input type="text" name="item_missionary_name___INDEX__" value="" class="dmc-input-wide" placeholder="선교사 이름" />

				</div>

				<div class="dmc-field">

					<label>선교지·기관명</label>

					<input type="text" name="item_name___INDEX__" value="" class="dmc-input-wide" placeholder="선교지·기관명" />

				</div>

				<div class="dmc-field">

					<label>순서 <span class="dmc-req">*</span></label>

					<input type="number" name="item_order___INDEX__" value="" class="dmc-input-wide" min="1" step="1" required="required" />

				</div>

				<div class="dmc-field">

					<label class="dmc-check"><input type="checkbox" class="dmc-dm-has-sub" name="item_has_sub___INDEX__" value="Y" /> 상세 페이지 있음</label>

				</div>

				<div class="dmc-field dmc-dm-sub-body-wrap" style="display:none">

					<label>사진설명 <span class="dmc-req">*</span></label>

					<textarea name="item_sub_body___INDEX__" rows="6" class="dmc-para-input dmc-dm-sub-body" placeholder="소개 글을 입력하세요."></textarea>

				</div>

			</div>

		</div>

	</div>

</template>



<script>

(function () {

	var list = document.getElementById('dmc-dm-item-list');

	var countInput = document.getElementById('dmc-dm-item-count');

	var tpl = document.getElementById('dmc-dm-item-template');

	if (!list || !countInput || !tpl) { return; }



	function toggleRow(row) {

		var hasSub = row.querySelector('.dmc-dm-has-sub');

		var on = hasSub && hasSub.checked;

		var simple = row.querySelector('.dmc-dm-photo-simple');

		var subPhoto = row.querySelector('.dmc-dm-photo-sub');

		var subBody = row.querySelector('.dmc-dm-sub-body-wrap');

		var bodyTa = row.querySelector('.dmc-dm-sub-body');

		if (simple) { simple.style.display = on ? 'none' : ''; }

		if (subPhoto) { subPhoto.style.display = on ? '' : 'none'; }

		if (subBody) { subBody.style.display = on ? '' : 'none'; }

		if (bodyTa) { bodyTa.required = !!on; }

	}



	function bindRow(row) {

		var cb = row.querySelector('.dmc-dm-has-sub');

		if (cb) {

			cb.addEventListener('change', function () { toggleRow(row); });

		}

		toggleRow(row);

	}



	function reindexRows() {

		list.querySelectorAll('.dmc-dm-row').forEach(function (row, i) {

			var strong = row.querySelector('.dmc-guide-section-head strong');

			if (strong) { strong.textContent = String(i + 1); }

			row.setAttribute('data-index', String(i));

			row.querySelectorAll('[name]').forEach(function (el) {

				if (!el.name) { return; }

				el.name = el.name.replace(/_(\d+)$/, '_' + i);

			});

		});

		countInput.value = String(list.querySelectorAll('.dmc-dm-row').length || 1);

	}



	list.querySelectorAll('.dmc-dm-row').forEach(bindRow);



	document.getElementById('dmc-add-dm-item').addEventListener('click', function () {

		var idx = parseInt(countInput.value, 10) || 0;

		var html = tpl.innerHTML.replace(/__INDEX__/g, String(idx)).replace(/__NUM__/g, String(list.querySelectorAll('.dmc-dm-row').length + 1));

		var wrap = document.createElement('div');

		wrap.innerHTML = html;

		var row = wrap.firstElementChild;

		list.appendChild(row);

		countInput.value = String(idx + 1);

		bindRow(row);

		row.scrollIntoView({ behavior: 'smooth', block: 'center' });

		var nameInput = row.querySelector('input[name^="item_name_"]');

		if (nameInput) { nameInput.focus(); }

	});



	list.addEventListener('click', function (e) {

		if (!e.target.classList.contains('dmc-remove-dm-item')) { return; }

		var row = e.target.closest('.dmc-dm-row');

		if (row && list.querySelectorAll('.dmc-dm-row').length > 1) {

			row.remove();

			reindexRows();

		}

	});



	var form = document.getElementById('dmc-dm-list-form');

	if (form) {

		form.addEventListener('submit', function () { reindexRows(); });

	}

})();

</script>
