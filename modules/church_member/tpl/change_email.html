<div class="church-member-wrap">
	<div class="church-member-box">
		<h1 class="church-member-heading">{$church_member_title}</h1>
		<!--@if($church_member_msg)-->
		<div class="church-member-msg<!--@if($church_member_msg_is_error)--> church-member-msg-error<!--@end-->">{$church_member_msg}</div>
		<!--@end-->
		<p class="church-member-lead">비밀번호 찾기 등에 사용하는 <strong>등록 이메일</strong>을 변경할 수 있습니다. 새 이메일로 확인 메일이 발송됩니다.</p>
		<div class="church-member-field">
			<label>현재 등록 이메일</label>
			<input type="text" value="{$current_email}" readonly="readonly" />
		</div>
		<!--@if($pending_email)-->
		<p class="church-member-lead">변경 대기 중: <strong>{$pending_email}</strong> — 해당 메일함에서 확인 링크를 클릭해 주세요.</p>
		<!--@end-->
		<form action="./" method="post">
			<input type="hidden" name="module" value="church_member" />
			<input type="hidden" name="act" value="procChurchChangeEmailRequest" />
			<input type="hidden" name="xe_validator_id" value="modules/church_member/tpl/change_email/1" />
			<input type="hidden" name="_rx_csrf_token" value="{$csrf_token}" />
			<div class="church-member-field">
				<label for="change_email">새 개인 이메일</label>
				<input type="email" id="change_email" name="email_address" required="required" placeholder="example@gmail.com" />
			</div>
			<div class="church-member-actions">
				<button type="submit" class="church-member-btn">변경 확인 메일 보내기</button>
				<a class="church-member-btn church-member-btn-secondary" href="{getUrl('','mid',Context::get('mid'))}">홈으로</a>
			</div>
		</form>
	</div>
</div>
