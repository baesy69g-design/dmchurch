<div class="church-member-wrap">
	<div class="church-member-box">
		<h1 class="church-member-heading">{$church_member_title}</h1>
		<!--@if($church_member_msg)-->
		<div class="church-member-msg<!--@if($church_member_msg_is_error)--> church-member-msg-error<!--@end-->">{$church_member_msg}</div>
		<!--@end-->
		<p class="church-member-lead">로그인에 성공했습니다. 앞으로 비밀번호 찾기 등에 사용할 <strong>개인 이메일</strong>을 입력해 주세요. 입력하신 주소로 확인 메일이 발송됩니다.</p>
		<form action="./" method="post">
			<input type="hidden" name="module" value="church_member" />
			<input type="hidden" name="act" value="procChurchSendVerifyEmail" />
			<input type="hidden" name="xe_validator_id" value="modules/church_member/tpl/verify_email/1" />
			<input type="hidden" name="_rx_csrf_token" value="{$csrf_token}" />
			<div class="church-member-field">
				<label for="verify_user_id">아이디</label>
				<input type="text" id="verify_user_id" value="{$user_id}" readonly="readonly" />
			</div>
			<div class="church-member-field">
				<label for="verify_email">개인 이메일</label>
				<input type="email" id="verify_email" name="email_address" value="{$pending_email}" required="required" placeholder="example@naver.com" />
			</div>
			<div class="church-member-actions">
				<button type="submit" class="church-member-btn">확인 메일 보내기</button>
			</div>
		</form>
	</div>
</div>
